name: Build OmniPacker

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            build_script: ./scripts/build-linux-x64.sh
            artifact_name: linux-x64
            target: x86_64-unknown-linux-gnu
            arch: x86_64
          - platform: ubuntu-22.04-arm
            build_script: ./scripts/build-linux-arm64.sh
            artifact_name: linux-arm64
            target: aarch64-unknown-linux-gnu
            arch: arm64
          - platform: windows-latest
            build_script: .\scripts\build-windows-x64.ps1
            artifact_name: windows-x64
            target: x86_64-pc-windows-msvc
            arch: x86_64
          - platform: windows-latest
            build_script: .\scripts\build-windows-arm64.ps1
            artifact_name: windows-arm64
            target: aarch64-pc-windows-msvc
            arch: arm64
          - platform: macos-latest
            build_script: ./scripts/build-macos-x64.sh
            artifact_name: macos-x64
            target: x86_64-apple-darwin
            arch: x86_64
          - platform: macos-latest
            build_script: ./scripts/build-macos-arm64.sh
            artifact_name: macos-arm64
            target: aarch64-apple-darwin
            arch: arm64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils rpm

      - name: Install frontend dependencies
        run: npm install

      - name: Make build script executable (Linux/macOS)
        if: matrix.platform != 'windows-latest'
        run: chmod +x ${{ matrix.build_script }}

      - name: Build with platform script
        run: ${{ matrix.build_script }}

      - name: Prepare release assets (Linux)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          set -e
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          BUNDLE="src-tauri/target/${{ matrix.target }}/release/bundle"
          mkdir -p release-assets
          cp "$BUNDLE"/appimage/*.AppImage "release-assets/OmniPacker-$VERSION.${{ matrix.arch }}.Linux.AppImage"
          cp "$BUNDLE"/deb/*.deb          "release-assets/OmniPacker-$VERSION.${{ matrix.arch }}.Linux.deb"
          cp "$BUNDLE"/rpm/*.rpm          "release-assets/OmniPacker-$VERSION.${{ matrix.arch }}.Linux.rpm"

      - name: Prepare release assets (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          set -e
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          BUNDLE="src-tauri/target/${{ matrix.target }}/release/bundle"
          mkdir -p release-assets
          cp "$BUNDLE"/dmg/*.dmg "release-assets/OmniPacker-$VERSION.${{ matrix.arch }}.MacOS.dmg"
          APP=$(ls -d "$BUNDLE"/macos/*.app | head -1)
          ditto -c -k --keepParent "$APP" "release-assets/OmniPacker-$VERSION.${{ matrix.arch }}.MacOS.Portable.zip"

      - name: Prepare release assets (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $bundle = "src-tauri/target/${{ matrix.target }}/release/bundle"
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          Copy-Item "$bundle/msi/*.msi"        "release-assets/OmniPacker-$version.${{ matrix.arch }}.Windows.Installer.msi"
          Copy-Item "$bundle/nsis/*-setup.exe" "release-assets/OmniPacker-$version.${{ matrix.arch }}.Windows.Setup.exe"
          # Option C: extract the NSIS installer with 7-Zip (no execution) to build a faithful, arch-independent portable.
          # Extract into a named folder so the zip wraps a single top-level directory the user can drag out intact.
          $setup = (Get-ChildItem "$bundle/nsis/*-setup.exe").FullName
          $folderName = "OmniPacker-$version.${{ matrix.arch }}.Windows"
          $portableDir = Join-Path $env:RUNNER_TEMP "portable-${{ matrix.arch }}/$folderName"
          & 7z x $setup "-o$portableDir" -y | Out-Null
          Remove-Item -Recurse -Force (Join-Path $portableDir '$PLUGINSDIR') -ErrorAction SilentlyContinue
          Remove-Item -Force (Join-Path $portableDir 'uninstall.exe') -ErrorAction SilentlyContinue
          Compress-Archive -Path "$portableDir" -DestinationPath "release-assets/OmniPacker-$version.${{ matrix.arch }}.Windows.Portable.zip"

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: omnipacker-${{ matrix.artifact_name }}
          path: release-assets/*

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/OmniPacker-*
          draft: true
          generate_release_notes: true
