name: Build OmniPacker

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            build_script: ./scripts/build-linux-x64.sh
            artifact_name: linux-x64
            target: x86_64-unknown-linux-gnu
          - platform: ubuntu-22.04-arm
            build_script: ./scripts/build-linux-arm64.sh
            artifact_name: linux-arm64
            target: aarch64-unknown-linux-gnu
          - platform: windows-latest
            build_script: .\scripts\build-windows-x64.ps1
            artifact_name: windows-x64
            target: x86_64-pc-windows-msvc
          - platform: windows-latest
            build_script: .\scripts\build-windows-arm64.ps1
            artifact_name: windows-arm64
            target: aarch64-pc-windows-msvc
          - platform: macos-latest
            build_script: ./scripts/build-macos-x64.sh
            artifact_name: macos-x64
            target: x86_64-apple-darwin
          - platform: macos-latest
            build_script: ./scripts/build-macos-arm64.sh
            artifact_name: macos-arm64
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Make build script executable (Linux/macOS)
        if: matrix.platform != 'windows-latest'
        run: chmod +x ${{ matrix.build_script }}

      - name: Build with platform script
        run: ${{ matrix.build_script }}

      - name: Upload artifacts (Linux)
        if: startsWith(matrix.platform, 'ubuntu')
        uses: actions/upload-artifact@v4
        with:
          name: omnipacker-${{ matrix.artifact_name }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb

      - name: Upload artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: omnipacker-${{ matrix.artifact_name }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe

      - name: Upload artifacts (macOS)
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: omnipacker-${{ matrix.artifact_name }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.msi
            artifacts/**/*.exe
            artifacts/**/*.dmg
          draft: true
          generate_release_notes: true
